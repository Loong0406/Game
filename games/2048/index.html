<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2048 | 经典数字游戏</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-page-body">
<div class="game-wrapper">
    <div class="game-panel">
        <div class="score-header">
            <div class="score-board">🎯 SCORE: <span id="gameScore">0</span></div>
            <button class="reset-btn" id="resetGame">🔄 新游戏</button>
        </div>
        <div id="gameContainer">
            <div id="gridContainer" class="grid-2048"></div>
        </div>
        <div class="swipe-hint">📱 手指滑动屏幕移动数字</div>
        <div class="controls-tip">← ↑ → ↓ 或 WASD 移动 | 触摸滑动</div>
        <a href="../../index.html" class="back-home">🏠 返回游戏中心</a>
    </div>
</div>
<script src="../../js/common.js"></script>
<script src="game.js"></script>
</body>
</html>
